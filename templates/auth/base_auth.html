<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ManufacturingHub{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"
        crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth-premium.css') }}">
    {% block head_extra %}{% endblock %}
</head>

<body class="auth-premium-body">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="auth-premium-flash-wrap" role="status" aria-live="polite">
        {% for category, message in messages %}
        <div class="auth-premium-flash auth-premium-flash--{{ category }}">
            {{ message }}
            <button type="button" class="auth-premium-flash__close" aria-label="Dismiss">&times;</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>

</html>
